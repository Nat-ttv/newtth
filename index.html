<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Alerta Verde AI</title>

<style>
body {
  font-family: Arial;
  background:#0f172a;
  color:white;
  text-align:center;
}

input, button {
  margin:5px;
  padding:8px;
  border-radius:5px;
  border:none;
}

button {
  background:green;
  color:white;
}

/* TARJETAS */
.card {
  background:#1e293b;
  margin:10px;
  padding:15px;
  border-radius:10px;
  width:300px;
  display:inline-block;
}

.falla {
  border:2px solid red;
  animation: blink 1s infinite;
}

@keyframes blink {
  50% { background:#7f1d1d; }
}

/* SEMÁFORO */
.semaforo div {
  width:15px;
  height:15px;
  border-radius:50%;
  display:inline-block;
  margin:2px;
}

/* IMPACTO */
.impacto {
  background:#020617;
  padding:8px;
  margin-top:10px;
  border-radius:8px;
  font-size:14px;
}

</style>
</head>

<body>

<h2>🌱 Alerta Verde AI</h2>

<!-- LOGIN -->
<div id="login">
  <input id="user" placeholder="Usuario">
  <input id="pass" type="password" placeholder="Contraseña">
  <br>
  <button onclick="registrar()">Registrarse</button>
  <button onclick="login()">Entrar</button>
</div>

<!-- APP -->
<div id="app" style="display:none;">

<br>

<input id="id" placeholder="ID del panel">
<input id="ubi" placeholder="Ubicación">
<input id="temp" placeholder="Temp °C">
<input id="volt" placeholder="Voltaje">
<input id="eff" placeholder="Eficiencia %">

<br>

<button onclick="add()">➕ Agregar panel</button>
<button onclick="run()">🚀 Analizar</button>

<div id="grid"></div>

</div>

<script>

let data = [];
let usuario = "";

// REGISTRO
function registrar(){
  let u = user.value;
  let p = pass.value;

  if(!u || !p){
    alert("Completa usuario y contraseña");
    return;
  }

  localStorage.setItem("user_"+u, p);
  alert("Usuario creado");
}

// LOGIN
function login(){
  let u = user.value;
  let p = pass.value;

  let guardado = localStorage.getItem("user_"+u);

  if(guardado === p){
    usuario = u;

    document.getElementById("login").style.display="none";
    document.getElementById("app").style.display="block";

    cargar();
    run();
  } else {
    alert("Datos incorrectos");
  }
}

// GUARDAR
function guardar(){
  localStorage.setItem("data_"+usuario, JSON.stringify(data));
}

// CARGAR
function cargar(){
  let d = localStorage.getItem("data_"+usuario);
  if(d){ data = JSON.parse(d); }
}

// AGREGAR PANEL
function add(){

  let panel = {
    id: id.value,
    u: ubi.value,
    t: Number(temp.value),
    v: Number(volt.value),
    e: Number(eff.value)
  };

  data.push(panel);
  guardar();

  alert("Panel agregado");
}

// ANALIZAR
function run(){

  let grid = document.getElementById("grid");
  grid.innerHTML = "";

  data.forEach(p => {

    let estado="Normal";
    let color="green";
    let motivo="Funcionamiento correcto";
    let dano="Ninguno";

    // FALLAS
    if(p.e < 50){
      estado="Falla";
      color="red";
      motivo="Baja eficiencia energética";
      dano="Celdas deterioradas";
    }

    if(p.t > 60){
      estado="Falla";
      color="red";
      motivo="Sobrecalentamiento";
      dano="Daño térmico";
    }

    if(p.v < 20){
      estado="Falla";
      color="red";
      motivo="Voltaje bajo";
      dano="Problema eléctrico";
    }

    if(p.v == 0){
      estado="Falla";
      color="red";
      motivo="Panel desconectado";
      dano="Cableado o inversor";
    }

    if(estado==="Normal" && p.e < 60){
      color="yellow";
      motivo="Rendimiento bajo";
      dano="Posible suciedad";
    }

    // IMPACTO
    let energia = Math.random()*10+10;
    let co2 = energia * 0.5;
    let clean = estado==="Falla" ? 60 : 100;
    let ahorro = energia;

    let card = document.createElement("div");
    card.className = estado==="Falla" ? "card falla" : "card";

    card.innerHTML = `
      <h3>🔆 Panel ${p.id}</h3>
      <p>📍 ${p.u}</p>

      <div class="semaforo">
        <div style="background:${color==='green'?'green':'gray'}"></div>
        <div style="background:${color==='yellow'?'yellow':'gray'}"></div>
        <div style="background:${color==='red'?'red':'gray'}"></div>
      </div>

      <p><b>${estado}</b></p>

      <p>⚠️ Motivo: ${motivo}</p>
      <p>🔧 Daño: ${dano}</p>

      <div class="impacto">
        <p>🌱 CO2 evitado: ${co2.toFixed(2)} kg</p>
        <p>⚡ Energía limpia: ${clean}%</p>
        <p>💰 Ahorro: ${ahorro.toFixed(2)} kWh</p>
      </div>
    `;

    grid.appendChild(card);

  });

}

</script>

</body>
</html>
