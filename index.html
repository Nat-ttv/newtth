<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>TuriSolar PRO</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<style>
body {margin:0;font-family: Arial;background:#0f172a;color:white;}

#login {
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
}

.login-box {
  background:#1e293b;
  padding:30px;
  border-radius:15px;
  width:300px;
  text-align:center;
}

input {
  width:90%;
  padding:10px;
  margin:8px 0;
  border-radius:8px;
  border:none;
}

button {
  padding:10px;
  border:none;
  border-radius:8px;
  background:#22c55e;
  color:white;
  margin:5px;
}

#app {
  display:none;
  text-align:center;
}

.card {
  background:#1e293b;
  margin:10px;
  padding:15px;
  border-radius:10px;
  width:280px;
  display:inline-block;
}

.falla {border:2px solid red;}

.semaforo div {
  width:15px;height:15px;border-radius:50%;
  display:inline-block;margin:2px;
}
</style>
</head>

<body>

<div id="login">
  <div class="login-box">
    <h2>🌱 TuriSolar</h2>

    <input id="user" placeholder="Usuario">
    <input id="pass" type="password" placeholder="Contraseña">
    <input id="correo" placeholder="Tu correo">

    <button onclick="registrar()">Registrarse</button>
    <button onclick="loginUser()">Entrar</button>

    <p id="msg"></p>
  </div>
</div>

<div id="app">

<button onclick="logout()">🚪 Salir</button>

<br>

<input id="id" placeholder="ID">
<input id="ubi" placeholder="Ubicación">
<input id="temp" placeholder="Temp">
<input id="volt" placeholder="Voltaje">
<input id="eff" placeholder="Eficiencia">
<input id="fecha" type="date">

<br>

<button onclick="add()">➕ Agregar Panel</button>
<button onclick="run()">🚀 Analizar</button>
<button onclick="generarPDF()">📄 PDF</button>

<div id="grid"></div>

</div>

<script>

let data=[];
let usuario="";
let emailUsuario="";
let editIndex=null;

/* MENSAJE */
function mostrarMsg(t,c="white"){
  let m=document.getElementById("msg");
  m.innerText=t;
  m.style.color=c;
}

/* REGISTRO */
function registrar(){
  let u=user.value.trim();
  let p=pass.value.trim();
  let c=correo.value.trim();

  if(!u||!p||!c){mostrarMsg("Completa todo","orange");return;}

  localStorage.setItem("user_"+u, JSON.stringify({pass:p,email:c}));
  mostrarMsg("Usuario creado","lightgreen");
}

/* LOGIN */
function loginUser(){
  let u=user.value.trim();
  let p=pass.value.trim();

  let g=localStorage.getItem("user_"+u);
  if(!g){mostrarMsg("No existe","red");return;}

  let datos=JSON.parse(g);

  if(datos.pass!==p){mostrarMsg("Contraseña incorrecta","red");return;}

  usuario=u;
  emailUsuario=datos.email;

  login.style.display="none";
  app.style.display="block";

  cargar();
  run();
}

/* LOGOUT */
function logout(){
  usuario="";
  app.style.display="none";
  login.style.display="flex";
}

/* STORAGE */
function guardar(){
  localStorage.setItem("data_"+usuario,JSON.stringify(data));
}

function cargar(){
  let d=localStorage.getItem("data_"+usuario);
  if(d) data=JSON.parse(d);
}

/* AGREGAR / EDITAR */
function add(){

  if(!id.value || !ubi.value){
    alert("Completa datos");
    return;
  }

  let panel={
    id:id.value,
    u:ubi.value,
    t:Number(temp.value)||0,
    v:Number(volt.value)||0,
    e:Number(eff.value)||0,
    f:fecha.value
  };

  if(editIndex!==null){
    data[editIndex]=panel;
    editIndex=null;
  } else {
    data.push(panel);
  }

  guardar();
  limpiar();
  run();
}

function limpiar(){
  id.value="";
  ubi.value="";
  temp.value="";
  volt.value="";
  eff.value="";
  fecha.value="";
}

/* EDITAR */
function editar(i){
  let p=data[i];

  id.value=p.id;
  ubi.value=p.u;
  temp.value=p.t;
  volt.value=p.v;
  eff.value=p.e;
  fecha.value=p.f;

  editIndex=i;
}

/* IA */
function predecirIA(p){
  let score=(p.t/100)*0.4 + ((100-p.e)/100)*0.4 + ((50-p.v)/50)*0.2;
  let prob=Math.min(Math.max(score*100,0),100);

  let estado="Normal";
  if(prob>70) estado="Falla";
  else if(prob>40) estado="Advertencia";

  return {estado,prob:prob.toFixed(1)};
}

/* ANALIZAR */
function run(){

  grid.innerHTML="";

  data.forEach((p,i)=>{

    let ia=predecirIA(p);
    let color="green";

    if(ia.estado==="Falla") color="red";
    else if(ia.estado==="Advertencia") color="orange";

    let card=document.createElement("div");
    card.className=ia.estado==="Falla"?"card falla":"card";

    card.innerHTML=`
      <h3>Panel ${p.id}</h3>
      <p>${p.u}</p>

      <div class="semaforo">
        <div style="background:${color==='green'?'green':'gray'}"></div>
        <div style="background:${color==='orange'?'orange':'gray'}"></div>
        <div style="background:${color==='red'?'red':'gray'}"></div>
      </div>

      <p>${ia.estado} (${ia.prob}%)</p>

      <button onclick="editar(${i})">✏️ Editar</button>
    `;

    grid.appendChild(card);
  });
}

/* PDF PRO */
function generarPDF(){

  const {jsPDF}=window.jspdf;
  let doc=new jsPDF();

  doc.setFontSize(16);
  doc.text("Reporte TuriSolar",10,10);

  let y=20;

  data.forEach(p=>{

    let ia=predecirIA(p);

    let costo = ia.estado==="Falla"?300:100;
    let energia = ia.estado==="Falla"?25:10;
    let dinero = energia*0.25;

    doc.setFontSize(12);
    doc.text(`Panel: ${p.id}`,10,y); y+=6;
    doc.text(`Ubicación: ${p.u}`,10,y); y+=6;
    doc.text(`Costo reparación: $${costo}`,10,y); y+=6;
    doc.text(`Energía perdida: ${energia} kWh`,10,y); y+=6;
    doc.text(`Pérdida económica: $${dinero.toFixed(2)}`,10,y); y+=10;

  });

  doc.save("Reporte_TuriSolar.pdf");
}

</script>

</body>
</html>
