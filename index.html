<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>TuriSolar PRO</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<style>
body {
  margin:0;
  font-family: Arial;
  background:#0f172a;
  color:white;
}

/* LOGIN */
#login {
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
}

.login-box {
  background:#1e293b;
  padding:30px;
  border-radius:15px;
  width:300px;
  text-align:center;
}

input {
  width:90%;
  padding:10px;
  margin:8px 0;
  border-radius:8px;
  border:none;
}

button {
  padding:10px;
  border:none;
  border-radius:8px;
  background:#22c55e;
  color:white;
  margin:5px;
  cursor:pointer;
}

/* APP */
#app {
  display:none;
  text-align:center;
  padding-top:20px;
}

.card {
  background:#1e293b;
  margin:10px;
  padding:15px;
  border-radius:10px;
  width:280px;
  display:inline-block;
}

.falla {
  border:2px solid red;
}

.semaforo div {
  width:15px;
  height:15px;
  border-radius:50%;
  display:inline-block;
  margin:2px;
}
</style>
</head>

<body>

<!-- LOGIN -->
<div id="login">
  <div class="login-box">
    <h2>🌱 TuriSolar</h2>

    <input id="user" placeholder="Usuario">
    <input id="pass" type="password" placeholder="Contraseña">

    <button onclick="registrar()">Registrarse</button>
    <button onclick="loginUser()">Entrar</button>

    <p id="msg"></p>
  </div>
</div>

<!-- APP -->
<div id="app">

<button onclick="logout()">🚪 Salir</button>

<br>

<input id="id" placeholder="ID">
<input id="ubi" placeholder="Ubicación">
<input id="temp" placeholder="Temp">
<input id="volt" placeholder="Voltaje">
<input id="eff" placeholder="Eficiencia">
<input id="fecha" type="date">

<br>

<button onclick="add()">➕ Agregar Panel</button>
<button onclick="run()">🚀 Analizar</button>

<div id="grid"></div>
<canvas id="grafico"></canvas>

</div>

<script>

let data = [];
let usuario = "";

/* MENSAJE */
function msg(t,c="white"){
  let m=document.getElementById("msg");
  m.innerText=t;
  m.style.color=c;
}

/* REGISTRO */
function registrar(){
  let u=user.value.trim();
  let p=pass.value.trim();

  if(!u || !p){
    msg("Completa campos","orange");
    return;
  }

  if(localStorage.getItem("user_"+u)){
    msg("Usuario ya existe","red");
    return;
  }

  localStorage.setItem("user_"+u,p);
  msg("Usuario creado","lightgreen");
}

/* LOGIN */
function loginUser(){
  let u=user.value.trim();
  let p=pass.value.trim();

  let g=localStorage.getItem("user_"+u);

  if(!g){ msg("No existe","red"); return; }
  if(g!==p){ msg("Contraseña incorrecta","red"); return; }

  usuario=u;
  login.style.display="none";
  app.style.display="block";

  cargar();
  run();
}

/* LOGOUT */
function logout(){
  usuario="";
  app.style.display="none";
  login.style.display="flex";
}

/* STORAGE */
function guardar(){
  localStorage.setItem("data_"+usuario,JSON.stringify(data));
}

function cargar(){
  let d=localStorage.getItem("data_"+usuario);
  if(d) data=JSON.parse(d);
}

/* AGREGAR (ARREGLADO) */
function add(){

  if(!id.value || !ubi.value){
    alert("Completa ID y ubicación");
    return;
  }

  let panel={
    id:id.value,
    u:ubi.value,
    t:Number(temp.value)||0,
    v:Number(volt.value)||0,
    e:Number(eff.value)||0,
    f:fecha.value
  };

  data.push(panel);

  guardar();

  limpiar();

  run(); // 🔥 IMPORTANTE (actualiza pantalla)
}

/* LIMPIAR */
function limpiar(){
  id.value="";
  ubi.value="";
  temp.value="";
  volt.value="";
  eff.value="";
  fecha.value="";
}

/* EDITAR */
function editar(i){
  let p=data[i];

  id.value=p.id;
  ubi.value=p.u;
  temp.value=p.t;
  volt.value=p.v;
  eff.value=p.e;
  fecha.value=p.f;

  data.splice(i,1);
  guardar();
  run();
}

/* IA */
function predecirIA(p){
  let score=(p.t/100)*0.4 + ((100-p.e)/100)*0.4 + ((50-p.v)/50)*0.2;
  let prob=Math.min(Math.max(score*100,0),100);

  let estado="Normal";
  if(prob>70) estado="Falla";
  else if(prob>40) estado="Advertencia";

  return {estado,prob:prob.toFixed(1)};
}

/* ANALIZAR */
function run(){

  let grid=document.getElementById("grid");
  grid.innerHTML="";

  let normales=0, fallas=0;

  data.forEach((p,i)=>{

    let ia=predecirIA(p);

    let color="green";

    if(ia.estado==="Falla"){color="red"; fallas++;}
    else if(ia.estado==="Advertencia"){color="orange"; normales++;}
    else normales++;

    let card=document.createElement("div");
    card.className=ia.estado==="Falla"?"card falla":"card";

    card.innerHTML=`
      <h3>Panel ${p.id}</h3>
      <p>${p.u}</p>

      <div class="semaforo">
        <div style="background:${color==='green'?'green':'gray'}"></div>
        <div style="background:${color==='orange'?'orange':'gray'}"></div>
        <div style="background:${color==='red'?'red':'gray'}"></div>
      </div>

      <p>${ia.estado} (${ia.prob}%)</p>

      <button onclick="editar(${i})">✏️ Editar</button>
    `;

    grid.appendChild(card);
  });

  new Chart(grafico,{
    type:"doughnut",
    data:{
      labels:["Normal","Falla"],
      datasets:[{data:[normales,fallas]}]
    }
  });
}

</script>

</body>
</html>
