<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>TuriSolar</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

<style>

body {
  background:#f8fafc;
  font-family: 'Segoe UI', sans-serif;
}

/* COLORES */
:root {
  --verde:#1b4332;
  --amarillo:#f4b400;
}

/* LOGIN */
#login {
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
}

.login-box {
  background:white;
  padding:40px;
  border-radius:15px;
  width:350px;
  box-shadow:0 10px 30px rgba(0,0,0,0.1);
  text-align:center;
}

.logo {
  width:80px;
  margin-bottom:10px;
}

/* DASHBOARD */
#dashboard {
  display:none;
  padding:20px;
}

.header {
  display:flex;
  justify-content:space-between;
  align-items:center;
  margin-bottom:20px;
}

.card-panel {
  border:none;
  border-radius:15px;
  box-shadow:0 5px 20px rgba(0,0,0,0.08);
}

/* SEMÁFORO */
.semaforo span {
  height:15px;
  width:15px;
  border-radius:50%;
  display:inline-block;
  margin-right:5px;
}

.verde { background:green; }
.amarillo { background:orange; }
.rojo { background:red; }

.badge-custom {
  padding:5px 10px;
  border-radius:10px;
}

</style>

</head>

<body>

<!-- LOGIN -->
<div id="login">
  <div class="login-box">

    <img src="logo.png" class="logo">

    <h4>TuriSolar</h4>
    <p class="text-muted">Turismo sostenible inteligente</p>

    <input id="user" class="form-control mb-2" placeholder="Usuario">
    <input id="pass" type="password" class="form-control mb-3" placeholder="Contraseña">

    <button class="btn w-100 mb-2 text-white" style="background:var(--verde)" onclick="registrar()">Registrarse</button>
    <button class="btn w-100 text-white" style="background:var(--amarillo)" onclick="login()">Entrar</button>

    <p id="msg" class="mt-2"></p>

  </div>
</div>

<!-- DASHBOARD -->
<div id="dashboard">

<div class="header">
  <h3 style="color:var(--verde)">🌱 Dashboard TuriSolar</h3>
  <button class="btn btn-danger" onclick="logout()">Salir</button>
</div>

<div class="row" id="grid"></div>

<button class="btn btn-dark mt-3" onclick="generarReporte()">📄 Generar Reporte</button>

</div>

<script>

let usuario = "";
let data = [
  {
    nombre:"Panel A1",
    zona:"Zona Administrativa",
    temp:75,
    volt:10,
    eff:40,
    fecha:"2015-01-01"
  },
  {
    nombre:"Panel B2",
    zona:"Zona Huéspedes",
    temp:40,
    volt:30,
    eff:90,
    fecha:"2022-01-01"
  }
];

/* LOGIN */
function registrar(){
  localStorage.setItem("user_"+user.value, pass.value);
  msg.innerText="Usuario creado";
}

function login(){
  let u=user.value;
  let p=pass.value;

  if(localStorage.getItem("user_"+u)===p){
    usuario=u;
    login.style.display="none";
    dashboard.style.display="block";
    render();
  } else {
    msg.innerText="Datos incorrectos";
  }
}

function logout(){
  dashboard.style.display="none";
  login.style.display="flex";
}

/* IA */
function analizar(p){

  if(p.temp>60 || p.volt<20 || p.eff<50){
    return {
      estado:"Falla",
      color:"rojo",
      motivo:"Problema energético",
      tipo:"Sobrecalentamiento o bajo rendimiento"
    };
  }

  if(p.eff<70){
    return {
      estado:"Advertencia",
      color:"amarillo",
      motivo:"Revisión preventiva",
      tipo:"Suciedad o desgaste"
    };
  }

  return {
    estado:"Óptimo",
    color:"verde",
    motivo:"Funcionamiento correcto",
    tipo:"Ninguno"
  };
}

/* GARANTÍA */
function garantia(fecha){

  let anos = (new Date() - new Date(fecha)) / (1000*60*60*24*365);

  if(anos < 10) return {estado:"Vigente", color:"success"};
  if(anos < 15) return {estado:"Por vencer", color:"warning"};
  return {estado:"Vencida", color:"danger"};
}

/* RENDER */
function render(){

  let grid = document.getElementById("grid");
  grid.innerHTML="";

  data.forEach(p=>{

    let a = analizar(p);
    let g = garantia(p.fecha);

    let btn = g.estado==="Vencida"
      ? `<button class="btn btn-danger mt-2">Contactar técnico</button>`
      : `<button class="btn btn-success mt-2">Contactar proveedor</button>`;

    let card = `
    <div class="col-md-4">
      <div class="card card-panel p-3">

        <h5>${p.nombre}</h5>
        <p>${p.zona}</p>

        <div class="semaforo mb-2">
          <span class="${a.color}"></span>
          ${a.estado}
        </div>

        <p><b>Motivo:</b> ${a.motivo}</p>
        <p><b>Tipo:</b> ${a.tipo}</p>

        <p><b>Instalación:</b> ${p.fecha}</p>
        <span class="badge bg-${g.color}">${g.estado}</span>

        <hr>

        <p><b>Impacto:</b></p>
        <p>⚡ Energía: ${a.estado==="Falla"? "Baja": "Óptima"}</p>
        <p>🌱 CO2: ${a.estado==="Falla"? "Alto": "Reducido"}</p>

        ${btn}

      </div>
    </div>
    `;

    grid.innerHTML += card;

  });

}

/* PDF */
function generarReporte(){
  alert("Aquí puedes conectar jsPDF para generar reporte");
}

</script>

</body>
</html>
